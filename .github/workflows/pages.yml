name: Living documentation (Pages)

# On a green main, regenerate the living documentation + Cucumber HTML report
# and publish them to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Provision env
        run: cp .env.example .env

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        working-directory: tests/playwright
        run: npx playwright install --with-deps chromium

      # Running the BDD suite produces the Cucumber HTML report. Fails the
      # workflow (and skips deploy) if a scenario is red — we only publish green.
      - name: Generate Cucumber report (web BDD)
        working-directory: tests/playwright
        run: npx bddgen && npx playwright test --project=bdd

      - name: Generate living documentation
        run: npm run docs:living

      - name: Assemble site
        run: |
          mkdir -p _site/cucumber
          cp tools/pages-index.html _site/index.html
          cp docs/living-documentation.html _site/living-documentation.html
          cp -r tests/playwright/reports/cucumber/. _site/cucumber/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
