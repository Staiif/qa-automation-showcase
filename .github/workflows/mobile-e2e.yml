name: Mobile E2E (Detox)

# Detox drives a real native build. The Android job runs on a Linux runner with
# a KVM-accelerated emulator; the iOS job needs a macOS runner with Xcode.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-e2e.yml'

jobs:
  detox-android:
    name: Detox — Android emulator (Gherkin FR + EN)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build Detox (Android)
        run: npx detox build --configuration android.emu.debug

      # The emulator OOMs if the Gradle daemons keep holding RAM — free it first.
      - name: Free memory before the emulator
        run: |
          (cd android && ./gradlew --stop) || true
          free -h

      - name: AVD snapshot cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-pixel7-api34-v1

      - name: Create AVD snapshot (on cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          avd-name: Pixel_7_API_34
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot-load
          disable-animations: false
          script: echo "AVD snapshot created."

      - name: Run Detox (Gherkin FR + EN)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          avd-name: Pixel_7_API_34
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot-save
          disable-animations: true
          working-directory: apps/mobile
          script: |
            # Debug build loads JS from Metro — start it and wait until ready.
            npx react-native start &
            echo "Waiting for Metro on 8081…"
            for i in $(seq 1 60); do
              if curl -sf http://localhost:8081/status | grep -q packager-status; then
                echo "Metro ready"; break
              fi
              sleep 2
            done
            adb reverse tcp:8081 tcp:8081 || true
            npx detox test --configuration android.emu.debug --headless --cleanup

      - name: Upload Detox artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: detox-artifacts-android
          path: apps/mobile/artifacts/
          retention-days: 14

  detox-ios:
    name: Detox — iOS simulator
    runs-on: macos-14
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v5

      - name: Guard — skip if native iOS project is absent
        id: guard
        run: |
          if [ -d "ios" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::apps/mobile/ios not generated — skipping Detox iOS run."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v5
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: 24

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: npm install

      - name: Install Detox CLI & applesimutils
        if: steps.guard.outputs.run == 'true'
        run: |
          brew tap wix/brew
          brew install applesimutils
          npm install -g detox-cli

      - name: Build app (Detox)
        if: steps.guard.outputs.run == 'true'
        run: detox build --configuration ios.sim.debug

      - name: Run Detox tests
        if: steps.guard.outputs.run == 'true'
        run: detox test --configuration ios.sim.debug --cleanup

      - name: Upload Detox artifacts
        if: failure() && steps.guard.outputs.run == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: detox-artifacts
          path: apps/mobile/artifacts/
          retention-days: 14
