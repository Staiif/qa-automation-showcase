name: Mobile E2E (Detox)

# Detox drives a real native build. The Android job runs on a Linux runner with
# a KVM-accelerated emulator; the iOS job needs a macOS runner with Xcode.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'

jobs:
  detox-android:
    name: Detox — Android emulator (Gherkin FR + EN)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build Detox (Android)
        run: npx detox build --configuration android.emu.debug

      - name: Run Detox on emulator (starts Metro)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          avd-name: Pixel_7_API_34
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          working-directory: apps/mobile
          script: |
            npx react-native start &
            npx detox test --configuration android.emu.debug --headless --cleanup

      - name: Upload Detox artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-android
          path: apps/mobile/artifacts/
          retention-days: 14

  detox-ios:
    name: Detox — iOS simulator
    runs-on: macos-14
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Guard — skip if native iOS project is absent
        id: guard
        run: |
          if [ -d "ios" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::apps/mobile/ios not generated — skipping Detox iOS run."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: 24

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: npm install

      - name: Install Detox CLI & applesimutils
        if: steps.guard.outputs.run == 'true'
        run: |
          brew tap wix/brew
          brew install applesimutils
          npm install -g detox-cli

      - name: Build app (Detox)
        if: steps.guard.outputs.run == 'true'
        run: detox build --configuration ios.sim.debug

      - name: Run Detox tests
        if: steps.guard.outputs.run == 'true'
        run: detox test --configuration ios.sim.debug --cleanup

      - name: Upload Detox artifacts
        if: steps.guard.outputs.run == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: apps/mobile/artifacts/
          retention-days: 14
