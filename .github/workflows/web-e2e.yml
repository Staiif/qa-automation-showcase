name: Web E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # Accounts come from the environment, never from source. In a real
      # project these would be GitHub secrets; the demo uses the example file.
      - name: Provision env
        run: cp .env.example .env

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (${{ matrix.browser }})
        working-directory: tests/playwright
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        working-directory: tests/playwright
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ matrix.browser }}
          path: tests/playwright/playwright-report/
          retention-days: 14

  bdd:
    name: BDD / Gherkin (FR + EN)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Provision env
        run: cp .env.example .env

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        working-directory: tests/playwright
        run: npx playwright install --with-deps chromium

      - name: Generate & run BDD scenarios
        working-directory: tests/playwright
        run: npx bddgen && npx playwright test --project=bdd

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-bdd
          path: tests/playwright/playwright-report/
          retention-days: 14
